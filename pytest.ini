[pytest]
# Pytest configuration for ACDC test suite

env =
    CUDA_VISIBLE_DEVICES=4

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Minimum Python version
minversion = 3.8

# Custom markers for organizing tests
markers =
    unit: Unit tests for isolated components
    integration: Integration tests for multi-component workflows
    evaluation: Tests for evaluation module (coverage, model selection, etc.)
    mutation: Tests for mutation operators
    crossover: Tests for crossover/merge operators
    slow: Tests that take a long time to run
    requires_gpu: Tests that require GPU access
    requires_model: Tests that require loading actual models
    requires_docker: Tests that require Docker daemon and acdc-sandbox image

# Coverage options (if pytest-cov is installed)
# --cov=mutation --cov=crossover --cov=evaluation --cov=dns --cov=datatypes
